function b64(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function entrar(){
  const err=document.getElementById('err'); err.textContent='Verificando...';
  try{
    const pw=document.getElementById('pw').value;
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:300000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(DATA));
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent='Contraseña incorrecta';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')entrar()});
