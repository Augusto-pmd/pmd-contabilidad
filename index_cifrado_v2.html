function b(s){var x=atob(s),a=new Uint8Array(x.length);for(var i=0;i<x.length;i++)a[i]=x.charCodeAt(i);return a}
async function go(){
var el=document.getElementById('pw'),m=document.getElementById('msg');
m.textContent='Verificando…';
try{
var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(el.value),'PBKDF2',false,['deriveKey']);
var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(S_),iterations:300000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(I_)},key,b(C_));
var html=new TextDecoder().decode(pt);
document.open();document.write(html);document.close();
}catch(e){m.textContent='Contraseña incorrecta';el.value='';el.focus()}
}
document.getElementById('btn').addEventListener('click',go);
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
window.entrar=go;
})();
</script>
